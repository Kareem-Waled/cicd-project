name: CI on Self-hosted Runner

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: node-runner        # ← your runner name

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show hostname
      run: hostname && uname -a

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Cleanup
      run: rm -rf node_modules
